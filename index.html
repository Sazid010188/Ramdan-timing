<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ৰমজান সময়সূচী Assam</title>
    
    <!-- PWA Meta Tags - Fixed without icon -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ৰমজান Assam">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="msapplication-TileColor" content="#0d1b2a">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1b2a;
            color: white;
            text-align: center;
            padding-bottom: 20px;
        }

        .header {
            background: #1b263b;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header small {
            font-size: 14px;
            display: block;
            color: #ffd700;
            margin-top: 5px;
        }

        .install-banner {
            background: #2ecc71;
            color: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: none;
            animation: slideDown 0.5s;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .install-banner button {
            background: white;
            color: #2ecc71;
            padding: 10px 20px;
            margin: 10px auto 5px;
            width: auto;
            display: inline-block;
        }

        .city-section {
            background: #1e2a3a;
            padding: 15px;
            margin: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .city-badge {
            background: #ffd700;
            color: #0d1b2a;
            padding: 8px 15px;
            border-radius: 25px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
        }

        select, button {
            width: 95%;
            max-width: 400px;
            margin: 8px auto;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: block;
        }

        select {
            background: #2d3b4f;
            color: white;
            border: 1px solid #ffd700;
        }

        button {
            background: #ffd700;
            color: #0d1b2a;
            border: none;
        }

        button:hover, button:active {
            transform: scale(0.98);
            background: #ffed4a;
        }

        .prayer-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        .card {
            flex: 1 1 200px;
            min-width: 150px;
            background: #415a77;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .card h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card h2 {
            font-size: 32px;
            color: white;
        }

        .timer-card {
            background: #1b263b;
            margin: 15px 10px;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffd700;
        }

        .timer {
            font-size: 42px;
            color: #ffd700;
            font-weight: bold;
            margin: 15px 0;
        }

        .hijri-date {
            background: #2a3b4c;
            padding: 15px;
            margin: 15px 10px;
            border-radius: 10px;
            font-size: 20px;
            border-left: 5px solid #ffd700;
        }

        .hijri-date span {
            color: #ffd700;
            font-weight: bold;
        }

        .month-table {
            margin: 20px 10px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e2a3a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        th {
            background: #ffd700;
            color: #0d1b2a;
            padding: 12px;
            font-size: 14px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #3a4a5f;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .today {
            background: #ffd70033;
            font-weight: bold;
            border-left: 4px solid #ffd700;
        }

        .mosque-btn {
            background: #2ecc71;
            color: white;
            margin: 10px auto;
        }

        .alarm-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .alarm-btn {
            flex: 1 1 150px;
            background: #e74c3c;
            color: white;
            margin: 0;
        }

        .alarm-btn.active {
            background: #27ae60;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #7f8c8d;
        }

        @media (max-width: 480px) {
            .timer {
                font-size: 32px;
            }
            .card h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    🕌 ৰমজান সময়সূচী Assam
    <small>رمضان مبارک</small>
</div>

<!-- Install Banner (will show when PWA install is available) -->
<div id="installBanner" class="install-banner">
    📲 Install our app for better experience!
    <button onclick="installPWA()">Install App</button>
    <br>
    <small onclick="this.parentElement.style.display='none'" style="cursor:pointer;">Close</small>
</div>

<div class="city-section">
    <div class="city-badge" id="currentCity">📍 Automatic Detection</div>
    
    <select id="citySelect" onchange="manualCity()">
        <option value="">🏙 চহৰ বাচনি কৰক (Select City)</option>
        <option value="26.1445,91.7362">Guwahati</option>
        <option value="26.3480,92.6840">Nagaon</option>
        <option value="26.3220,91.0060">Barpeta</option>
        <option value="26.5030,90.5480">Bongaigaon</option>
        <option value="26.6330,92.8000">Tezpur</option>
        <option value="26.7509,94.2037">Jorhat</option>
        <option value="26.7271,93.9583">Golaghat</option>
        <option value="26.1100,91.7200">Dispur</option>
        <option value="26.6238,92.7958">Morigaon</option>
        <option value="26.1843,91.7452">Kamrup</option>
    </select>

    <button onclick="startApp()" style="background: #3498db; color: white;">📍 Auto Detect My Location</button>
</div>

<div class="hijri-date" id="hijriDisplay">
    🌙 হিজৰী তাৰিখ: <span>Loading...</span>
</div>

<div class="prayer-cards">
    <div class="card">
        <h3>🌅 ছেহৰি</h3>
        <h2 id="sehri">--:--</h2>
    </div>

    <div class="card">
        <h3>🌇 ইফতাৰ</h3>
        <h2 id="iftar">--:--</h2>
    </div>
</div>

<div class="timer-card">
    <h3>⏳ ইফতাৰলৈ বাকী সময়</h3>
    <div class="timer" id="countdown">--:--:--</div>
    
    <div class="alarm-controls">
        <button class="alarm-btn" id="sehriAlarmBtn" onclick="toggleAlarm('sehri')">🔔 ছেহৰি এলাৰ্ম Set কৰক</button>
        <button class="alarm-btn" id="iftarAlarmBtn" onclick="toggleAlarm('iftar')">🔔 ইফতাৰ এলাৰ্ম Set কৰক</button>
    </div>
</div>

<div class="month-table">
    <h3>📅 ৩০ দিনৰ সময়সূচী</h3>
    <table id="ramadanTable">
        <thead>
            <tr>
                <th>দিন</th>
                <th>তাৰিখ</th>
                <th>ছেহৰি</th>
                <th>ইফতাৰ</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="4">Loading...</td></tr>
        </tbody>
    </table>
</div>

<button class="mosque-btn" onclick="findMosque()">🕌 ওচৰৰ মছজিদ বিচাৰক</button>

<audio id="azan" src="azan.mp3" preload="auto"></audio>

<div class="footer">
    © 2026 ৰমজানৰ সময়সূচী| Made with 💕 by Jajabor AI
</div>

<script>
    // Global Variables
    let deferredPrompt;
    let currentLat = 26.1445;
    let currentLon = 91.7362;
    let currentCity = "Guwahati";
    let sehriAlarm = null;
    let iftarAlarm = null;
    let alarmPermission = false;

    // PWA Install - Fixed version
    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later
        deferredPrompt = e;
        // Show the install banner
        document.getElementById('installBanner').style.display = 'block';
        console.log('Install prompt available');
    });

    // Install PWA function
    window.installPWA = function() {
        if (!deferredPrompt) {
            console.log('No install prompt available');
            return;
        }
        
        // Show the install prompt
        deferredPrompt.prompt();
        
        // Wait for the user to respond to the prompt
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the install prompt');
                document.getElementById('installBanner').style.display = 'none';
            } else {
                console.log('User dismissed the install prompt');
            }
            deferredPrompt = null;
        });
    };

    // Check if already installed
    window.addEventListener('appinstalled', (evt) => {
        console.log('App was installed');
        document.getElementById('installBanner').style.display = 'none';
    });

    // Request Notification Permission
    async function requestNotificationPermission() {
        if (!('Notification' in window)) {
            alert('This browser does not support notifications');
            return;
        }
        
        if (Notification.permission === 'granted') {
            alarmPermission = true;
        } else if (Notification.permission !== 'denied') {
            const permission = await Notification.requestPermission();
            alarmPermission = permission === 'granted';
        }
    }

    // Call on load
    requestNotificationPermission();

    // Manual City Selection
    function manualCity() {
        let val = document.getElementById("citySelect").value;
        if (val === "") return;
        let coords = val.split(",");
        let cityName = document.getElementById("citySelect").options[document.getElementById("citySelect").selectedIndex].text;
        currentCity = cityName;
        document.getElementById("currentCity").innerHTML = `📍 ${cityName}`;
        loadPrayer(coords[0], coords[1]);
        loadMonthTable(coords[0], coords[1]);
    }

    // Auto GPS
    function startApp() {
        if (!navigator.geolocation) {
            alert("GPS Not Supported");
            return;
        }
        document.getElementById("currentCity").innerHTML = "📍 Locating...";
        navigator.geolocation.getCurrentPosition(success, error, {
            enableHighAccuracy: true,
            timeout: 10000
        });
    }

    function success(pos) {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;
        currentLat = lat;
        currentLon = lon;
        
        // Reverse geocoding to get city name
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
                let city = data.address.city || data.address.town || data.address.village || "Assam";
                currentCity = city;
                document.getElementById("currentCity").innerHTML = `📍 ${city}`;
            })
            .catch(() => {
                document.getElementById("currentCity").innerHTML = "📍 Location Detected";
            });

        loadPrayer(lat, lon);
        loadMonthTable(lat, lon);
        loadHijriDate();
    }

    function error() {
        alert("Location Denied ❌. Using default city (Guwahati)");
        document.getElementById("currentCity").innerHTML = "📍 Guwahati (Default)";
        loadPrayer(26.1445, 91.7362);
        loadMonthTable(26.1445, 91.7362);
    }

    // Load Hijri Date
    async function loadHijriDate() {
        try {
            let today = new Date();
            let res = await fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`);
            let data = await res.json();
            let hijri = data.data.hijri;
            document.getElementById("hijriDisplay").innerHTML = `🌙 হিজৰী তাৰিখ: <span>${hijri.day} ${hijri.month.en} ${hijri.year}</span>`;
        } catch (e) {
            document.getElementById("hijriDisplay").innerHTML = `🌙 হিজৰী তাৰিখ: <span>ৰমজান ১৪৪৫</span>`;
        }
    }

    // Load Today's Prayer
    async function loadPrayer(lat, lon) {
        try {
            let today = new Date();
            let month = today.getMonth() + 1;
            let year = today.getFullYear();
            let date = today.getDate();

            let url = `https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=1&month=${month}&year=${year}`;

            let res = await fetch(url);
            let json = await res.json();

            let sehri = json.data[date-1].timings.Fajr.split(" ")[0];
            let iftar = json.data[date-1].timings.Maghrib.split(" ")[0];

            document.getElementById("sehri").innerHTML = sehri;
            document.getElementById("iftar").innerHTML = iftar;

            startCountdown(iftar);
            scheduleAlarms(sehri, iftar);

        } catch(e) {
            alert("Time Load Failed. Using backup data.");
            // Backup times
            document.getElementById("sehri").innerHTML = "04:00";
            document.getElementById("iftar").innerHTML = "17:45";
            startCountdown("17:45");
        }
    }

    // Load 30 Days Table
    async function loadMonthTable(lat, lon) {
        try {
            let today = new Date();
            let month = today.getMonth() + 1;
            let year = today.getFullYear();

            let url = `https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=1&month=${month}&year=${year}`;

            let res = await fetch(url);
            let json = await res.json();
            
            let tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            for (let i = 0; i < 30; i++) {
                if (!json.data[i]) continue;
                
                let day = i + 1;
                let gregorian = json.data[i].date.gregorian.date;
                let sehri = json.data[i].timings.Fajr.split(" ")[0];
                let iftar = json.data[i].timings.Maghrib.split(" ")[0];
                
                let rowClass = (day === new Date().getDate()) ? 'class="today"' : '';
                
                tbody.innerHTML += `<tr ${rowClass}>
                    <td>দিন ${day}</td>
                    <td>${gregorian}</td>
                    <td>${sehri}</td>
                    <td>${iftar}</td>
                </tr>`;
            }
        } catch(e) {
            console.log("Table load failed");
        }
    }

    // Countdown Timer
    function startCountdown(iftar) {
        let azan = document.getElementById("azan");

        setInterval(() => {
            let now = new Date();
            let parts = iftar.split(":");

            let iftarTime = new Date();
            iftarTime.setHours(parseInt(parts[0]), parseInt(parts[1]), 0);

            let diff = iftarTime - now;

            if (diff <= 0) {
                azan.play().catch(e => console.log("Audio play failed"));
                
                if (alarmPermission) {
                    new Notification("🌙 ইফতাৰ সময় হৈছে!", {
                        body: "আজিৰ ইফতাৰৰ সময় হৈছে। আল্লাহ accept কৰক।"
                    });
                }
                return;
            }

            let h = Math.floor(diff / (1000 * 60 * 60));
            let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

        }, 1000);
    }

    // Schedule Alarms
    function scheduleAlarms(sehri, iftar) {
        // Clear existing alarms
        if (sehriAlarm) clearTimeout(sehriAlarm);
        if (iftarAlarm) clearTimeout(iftarAlarm);

        let now = new Date();
        let sehriTime = new Date();
        let iftarTime = new Date();

        let sehriParts = sehri.split(":");
        let iftarParts = iftar.split(":");

        sehriTime.setHours(parseInt(sehriParts[0]), parseInt(sehriParts[1]), 0);
        iftarTime.setHours(parseInt(iftarParts[0]), parseInt(iftarParts[1]), 0);

        // If time passed today, schedule for tomorrow
        if (sehriTime < now) {
            sehriTime.setDate(sehriTime.getDate() + 1);
        }
        if (iftarTime < now) {
            iftarTime.setDate(iftarTime.getDate() + 1);
        }

        // Store alarm times in localStorage
        localStorage.setItem('sehriAlarm', sehri);
        localStorage.setItem('iftarAlarm', iftar);
    }

    // Toggle Alarm
    function toggleAlarm(type) {
        requestNotificationPermission();
        
        if (!alarmPermission) {
            alert("Please allow notification permission for alarms");
            return;
        }

        let btn = document.getElementById(`${type}AlarmBtn`);
        
        if (btn.classList.contains('active')) {
            // Disable alarm
            btn.classList.remove('active');
            btn.innerHTML = `🔔 ${type === 'sehri' ? 'ছেহৰি' : 'ইফতাৰ'} এলাৰ্ম Set কৰক`;
            btn.style.background = '#e74c3c';
            
            if (type === 'sehri') {
                localStorage.removeItem('sehriAlarmEnabled');
            } else {
                localStorage.removeItem('iftarAlarmEnabled');
            }
        } else {
            // Enable alarm
            btn.classList.add('active');
            btn.innerHTML = `✅ ${type === 'sehri' ? 'ছেহৰি' : 'ইফতাৰ'} এলাৰ্ম Set হৈছে`;
            btn.style.background = '#27ae60';
            
            if (type === 'sehri') {
                localStorage.setItem('sehriAlarmEnabled', 'true');
            } else {
                localStorage.setItem('iftarAlarmEnabled', 'true');
            }
            
            alert(`${type === 'sehri' ? 'ছেহৰি' : 'ইফতাৰ'} এলাৰ্ম সফলভাবে set হৈছে!`);
        }
    }

    // Find Nearby Mosque
    function findMosque() {
        if (!navigator.geolocation) {
            alert("GPS not supported");
            return;
        }

        navigator.geolocation.getCurrentPosition((pos) => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;
            
            // Open in Google Maps
            window.open(`https://www.google.com/maps/search/mosque/@${lat},${lon},15z`, '_blank');
        }, () => {
            alert("Unable to get location. Please enable GPS.");
        });
    }

    // Auto detect on load
    window.onload = function() {
        // Try auto detect
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(success, () => {
                loadPrayer(26.1445, 91.7362);
                loadMonthTable(26.1445, 91.7362);
                loadHijriDate();
            });
        } else {
            loadPrayer(26.1445, 91.7362);
            loadMonthTable(26.1445, 91.7362);
            loadHijriDate();
        }

        // Check for saved alarms
        if (localStorage.getItem('sehriAlarmEnabled')) {
            document.getElementById('sehriAlarmBtn').classList.add('active');
            document.getElementById('sehriAlarmBtn').innerHTML = '✅ ছেহৰি এলাৰ্ম Set হৈছে';
            document.getElementById('sehriAlarmBtn').style.background = '#27ae60';
        }
        
        if (localStorage.getItem('iftarAlarmEnabled')) {
            document.getElementById('iftarAlarmBtn').classList.add('active');
            document.getElementById('iftarAlarmBtn').innerHTML = '✅ ইফতাৰ এলাৰ্ম Set হৈছে';
            document.getElementById('iftarAlarmBtn').style.background = '#27ae60';
        }
    };

    // Service Worker Registration - Fixed
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js')
                .then(function(registration) {
                    console.log('ServiceWorker registered successfully: ', registration.scope);
                })
                .catch(function(error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
        });
    }

    // Background sync for alarms (simplified)
    setInterval(() => {
        let now = new Date();
        let currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        // Check Sehri Alarm
        if (localStorage.getItem('sehriAlarmEnabled') === 'true' && localStorage.getItem('sehriAlarm')) {
            let alarmTime = localStorage.getItem('sehriAlarm');
            if (currentTime === alarmTime) {
                new Notification("🌅 ছেহৰিৰ সময় হৈছে!", {
                    body: "ছেহৰি খাই লওক। আজিৰ ৰোজা আল্লাহ accept কৰক।"
                });
                
                // Play azan
                document.getElementById('azan').play().catch(e => console.log("Audio play failed"));
            }
        }
        
        // Check Iftar Alarm
        if (localStorage.getItem('iftarAlarmEnabled') === 'true' && localStorage.getItem('iftarAlarm')) {
            let alarmTime = localStorage.getItem('iftarAlarm');
            if (currentTime === alarmTime) {
                new Notification("🌇 ইফতাৰৰ সময় হৈছে!", {
                    body: "খোৱা-খাদ্য গ্রহণ কৰক।"
                });
                
                // Play azan
                document.getElementById('azan').play().catch(e => console.log("Audio play failed"));
            }
        }
    }, 60000); // Check every minute

</script>
</body>
</html>
